name: 유튜브 떡상 리포트

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install requests

      - name: 분석 실행 및 이메일 발송
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          REGION_CODES: ${{ vars.REGION_CODES || 'KR' }}
          MAX_SUBSCRIBERS: ${{ vars.MAX_SUBSCRIBERS || '10000' }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '48' }}
          TOP_N_PER_CATEGORY: ${{ vars.TOP_N_PER_CATEGORY || '5' }}
        run: python analyzer.py

      - name: 구독자 히스토리 저장
        run: |
          git config user.name "yt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add channel_history.json || true
          git diff --cached --quiet || git commit -m "구독자 스냅샷"
          git push
