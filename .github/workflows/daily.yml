name: 떡상 레이더 수집

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      region:
        description: "수집할 국가 (비우면 요일 자동선택)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 라이브러리 설치
        run: pip install requests

      - name: 수집 실행
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          FORCE_REGION: ${{ github.event.inputs.region }}
          MAX_SUBSCRIBERS: ${{ vars.MAX_SUBSCRIBERS || '10000' }}
          LOOKBACK_HOURS: ${{ vars.LOOKBACK_HOURS || '48' }}
          TOP_N_PER_CATEGORY: ${{ vars.TOP_N_PER_CATEGORY || '8' }}
        run: python collector.py

      - name: 결과 저장 (커밋)
        run: |
          git config user.name "yt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/*.json || true
          git diff --cached --quiet || git commit -m "수집 $(date +'%Y-%m-%d')"
          git push
