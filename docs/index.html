<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>떡상 레이더 · 소형 채널 급상승 탐지</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0e14; --panel:#111721; --panel2:#161d29;
    --line:#232c3b; --line2:#2e3a4d;
    --dim:#7d8ba0; --dim2:#9aa8bd; --text:#e8edf4;
    --signal:#00e08a; --signal-dim:#0a5c3f;
    --hot:#ff5a3c; --hot-bg:#2a130e;
    --amber:#ffb020;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--ink); color:var(--text);
    font-family:'Noto Sans KR',sans-serif; line-height:1.6;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 15% -10%, #10231b 0%, transparent 45%),
                     radial-gradient(circle at 95% 0%, #1a1410 0%, transparent 40%);
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 20px}

  header{padding:40px 0 20px;border-bottom:1px solid var(--line)}
  .logo{display:flex;align-items:center;gap:12px}
  .logo .dot{width:11px;height:11px;border-radius:50%;background:var(--signal);
    box-shadow:0 0 0 0 rgba(0,224,138,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,224,138,.5)}70%{box-shadow:0 0 0 12px rgba(0,224,138,0)}100%{box-shadow:0 0 0 0 rgba(0,224,138,0)}}
  .logo h1{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}
  .logo h1 .k{color:var(--signal)}
  .tagline{color:var(--dim);font-size:14px;margin-top:8px;max-width:560px}
  .meta{margin-top:14px;font-size:12.5px;color:var(--dim);font-family:'Space Grotesk',sans-serif;
    display:flex;gap:16px;flex-wrap:wrap}
  .meta b{color:var(--dim2);font-weight:500}

  .controls{position:sticky;top:0;z-index:20;background:rgba(10,14,20,.92);
    backdrop-filter:blur(10px);padding:16px 0;border-bottom:1px solid var(--line);margin-bottom:8px}
  .ctrl-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .ctrl-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;
    font-family:'Space Grotesk',sans-serif;margin-right:4px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{background:none;border:none;color:var(--dim2);font-family:'Space Grotesk',sans-serif;
    font-size:13px;font-weight:500;padding:7px 16px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--signal);color:#04120c}
  .seg button:not(.on):hover{color:var(--text)}

  .cats{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--dim2);
    font-size:13px;padding:6px 13px;border-radius:20px;cursor:pointer;transition:.15s;white-space:nowrap}
  .chip:hover{border-color:var(--line2);color:var(--text)}
  .chip.on{background:var(--text);color:var(--ink);border-color:var(--text);font-weight:500}

  main{padding:24px 0 80px}
  .section-title{font-family:'Space Grotesk',sans-serif;font-size:13px;letter-spacing:2px;
    text-transform:uppercase;color:var(--dim);margin:32px 0 14px;display:flex;align-items:center;gap:10px}
  .section-title::after{content:'';flex:1;height:1px;background:var(--line)}
  .section-title.hot{color:var(--hot)}

  .cat-block{margin-bottom:10px}
  .cat-head{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;
    margin:26px 0 12px;display:flex;align-items:baseline;gap:10px}
  .cat-head .count{font-size:12px;color:var(--dim);font-weight:400}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;
    transition:.18s;position:relative}
  .card:hover{border-color:var(--line2);transform:translateY(-2px);background:var(--panel2)}
  .thumb-wrap{position:relative;aspect-ratio:16/9;background:#0d131c;overflow:hidden}
  .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block}
  .badge{position:absolute;top:8px;left:8px;background:var(--hot);color:#fff;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;
    padding:3px 9px;border-radius:7px;letter-spacing:.3px}
  .badge.calm{background:var(--panel);color:var(--signal);border:1px solid var(--signal-dim)}
  .card-body{padding:12px 13px 14px}
  .card-title{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:9px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .chan{font-size:12.5px;color:var(--dim2);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .stats{display:flex;gap:14px;font-family:'Space Grotesk',sans-serif;font-size:12px;color:var(--dim)}
  .stats .v{color:var(--text);font-weight:500}
  .stats .mult{color:var(--amber);font-weight:700}

  .growth-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .gcard{background:var(--hot-bg);border:1px solid #3d2018;border-radius:12px;padding:14px 16px;
    text-decoration:none;color:inherit;display:block;transition:.15s}
  .gcard:hover{border-color:var(--hot)}
  .gcard .gt{font-weight:500;font-size:14px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gcard .gn{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--dim2)}
  .gcard .gn .up{color:var(--hot);font-weight:700}

  .empty{text-align:center;padding:70px 20px;color:var(--dim)}
  .empty .big{font-family:'Space Grotesk',sans-serif;font-size:19px;color:var(--dim2);margin-bottom:8px}
  .loading{text-align:center;padding:80px 20px;color:var(--dim);font-family:'Space Grotesk',sans-serif}
  .spinner{width:26px;height:26px;border:2.5px solid var(--line);border-top-color:var(--signal);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{border-top:1px solid var(--line);padding:24px 0 40px;color:var(--dim);font-size:12px;text-align:center}

  @media(max-width:560px){
    .logo h1{font-size:22px}
    .grid{grid-template-columns:1fr}
    header{padding:28px 0 16px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="logo">
      <span class="dot"></span>
      <h1>떡상 <span class="k">레이더</span></h1>
    </div>
    <p class="tagline">아직 작은 채널에서 터지고 있는 영상을 매일 포착합니다. 구독자는 적은데 조회수가 폭발한 순간, 남들보다 먼저.</p>
    <div class="meta" id="meta"></div>
  </div>
</header>

<div class="controls">
  <div class="wrap">
    <div class="ctrl-row">
      <span class="ctrl-label">국가</span>
      <div class="seg" id="regionSeg">
        <button data-region="KR" class="on">한국</button>
        <button data-region="US">미국</button>
      </div>
    </div>
    <div class="cats" id="cats"></div>
  </div>
</div>

<main class="wrap" id="main">
  <div class="loading"><div class="spinner"></div>신호를 수신하는 중…</div>
</main>

<footer>
  <div class="wrap">떡상 레이더 · 구독자 1만 이하 신규 채널 대상 · 매일 자동 갱신</div>
</footer>

<script>
const REGIONS = ["KR","US"];
const state = { region:"KR", cat:"전체", data:{} };

function fmt(n){
  if(n>=10000) return (n/10000).toFixed(1).replace(/\.0$/,'')+"만";
  return n.toLocaleString();
}
function fmtUS(n){
  if(n>=1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'')+"M";
  if(n>=1000) return (n/1000).toFixed(1).replace(/\.0$/,'')+"K";
  return n.toLocaleString();
}
function num(n){ return state.region==="US" ? fmtUS(n) : fmt(n); }

async function loadRegion(region){
  if(state.data[region]) return state.data[region];
  try{
    const res = await fetch(`data/${region}.json?t=${Date.now()}`);
    if(!res.ok) throw new Error("no data");
    const json = await res.json();
    state.data[region] = json;
    return json;
  }catch(e){
    state.data[region] = null;
    return null;
  }
}

function render(){
  const main = document.getElementById("main");
  const d = state.data[state.region];
  const meta = document.getElementById("meta");

  if(!d){
    meta.innerHTML = "";
    main.innerHTML = `<div class="empty"><div class="big">아직 수집된 데이터가 없어요</div>
      이 국가의 첫 수집이 끝나면 여기에 결과가 나타납니다.</div>`;
    return;
  }

  meta.innerHTML = `<span>마지막 갱신 · <b>${d.updated_at}</b></span>
    <span>대상 · <b>구독자 ${num(d.max_subs)} 이하</b></span>
    <span>기준 · <b>최근 ${d.lookback_hours}시간 업로드</b></span>`;

  // category chips
  const cats = document.getElementById("cats");
  const catNames = Object.keys(d.categories);
  const withVideos = catNames.filter(c => d.categories[c].length>0);
  const chips = ["전체", ...catNames];
  cats.innerHTML = chips.map(c=>{
    const cnt = c==="전체" ? withVideos.reduce((s,x)=>s+d.categories[x].length,0) : d.categories[c].length;
    const on = c===state.cat ? "on":"";
    const dim = (c!=="전체" && cnt===0) ? 'style="opacity:.4"' : '';
    return `<span class="chip ${on}" data-cat="${c}" ${dim}>${c}${cnt?` <span style="opacity:.6">${cnt}</span>`:''}</span>`;
  }).join("");
  cats.querySelectorAll(".chip").forEach(ch=>{
    ch.onclick = ()=>{ state.cat = ch.dataset.cat; render(); };
  });

  let html = "";

  // growth section (only in 전체 view)
  if(state.cat==="전체" && d.growth && d.growth.length){
    html += `<div class="section-title hot">🔥 구독자 급증 채널</div><div class="growth-grid">`;
    html += d.growth.slice(0,8).map(g=>`
      <a class="gcard" href="https://www.youtube.com/channel/${g.channel_id}" target="_blank" rel="noopener">
        <div class="gt">${esc(g.title)}</div>
        <div class="gn">${num(g.prev_subs)} → <b style="color:var(--text)">${num(g.now_subs)}</b>
          <span class="up">+${g.growth}%</span></div>
      </a>`).join("");
    html += `</div>`;
  }

  // videos
  const showCats = state.cat==="전체" ? catNames : [state.cat];
  const anyVideo = showCats.some(c => d.categories[c] && d.categories[c].length);

  if(!anyVideo){
    html += `<div class="empty"><div class="big">이 조건에 맞는 떡상 영상이 없어요</div>
      다른 카테고리를 골라보거나, 다음 갱신을 기다려 주세요.</div>`;
  } else {
    if(state.cat==="전체") html += `<div class="section-title">📡 카테고리별 급상승</div>`;
    showCats.forEach(cat=>{
      const vids = d.categories[cat] || [];
      if(!vids.length) return;
      html += `<div class="cat-block"><div class="cat-head">${cat}
        <span class="count">${vids.length}건</span></div><div class="grid">`;
      html += vids.map(v=>{
        const hot = v.multiplier>=10;
        const badge = hot
          ? `<span class="badge">${v.multiplier}×</span>`
          : `<span class="badge calm">${v.multiplier}×</span>`;
        return `<a class="card" href="https://www.youtube.com/watch?v=${v.video_id}" target="_blank" rel="noopener">
          <div class="thumb-wrap">${v.thumb?`<img src="${v.thumb}" loading="lazy" alt="">`:''}${badge}</div>
          <div class="card-body">
            <div class="card-title">${esc(v.title)}</div>
            <div class="chan">${esc(v.channel_title)} · 구독 ${num(v.subs)}</div>
            <div class="stats">
              <span><span class="v">${num(v.views)}</span> 조회</span>
              <span>시간당 ${num(v.vph)}</span>
              <span class="mult">구독대비 ${v.multiplier}배</span>
            </div>
          </div></a>`;
      }).join("");
      html += `</div></div>`;
    });
  }

  main.innerHTML = html;
}

function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

document.getElementById("regionSeg").querySelectorAll("button").forEach(b=>{
  b.onclick = async ()=>{
    document.querySelectorAll("#regionSeg button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    state.region = b.dataset.region; state.cat="전체";
    document.getElementById("main").innerHTML = `<div class="loading"><div class="spinner"></div>신호를 수신하는 중…</div>`;
    await loadRegion(state.region); render();
  };
});

(async ()=>{ await loadRegion("KR"); render(); })();
</script>
</body>
</html>
